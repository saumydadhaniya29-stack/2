<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading… – FlowGem</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="series-style.css" />
</head>
<body>

<!-- HEADER -->
<div class="lb-header">
  <a href="../index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
  <img src="../images/logo/flowgem-logo.png" alt="FlowGem" class="lb-logo" />
  <h1 id="seriesTitle">Loading…</h1>
  <p id="seriesSubtitle"></p>
  <div class="lb-badges">
    <span class="lb-badge"><i class="fa-solid fa-shield-halved"></i> 36 Month Warranty</span>
    <span class="lb-badge"><i class="fa-solid fa-leaf"></i> Lead-Free PTMT</span>
    <span class="lb-badge"><i class="fa-solid fa-medal"></i> ISI Certified</span>
    <span class="lb-badge"><i class="fa-solid fa-droplet"></i> Water Saving</span>
  </div>
</div>

<!-- PRODUCT GRID -->
<div class="lb-container">
  <div class="lb-section-title">
    <h2>All <span id="productCount">0</span> Products</h2>
    <p>Tap any product to send an enquiry directly on WhatsApp</p>
  </div>

  <div class="lb-toolbar">
    <input type="text" class="lb-search" id="lbSearch" placeholder="Search by name or code…" />
  </div>

  <div class="lb-grid" id="lbGrid"></div>
  <div class="lb-empty" id="lbEmpty">No products match your search.</div>

</div><!-- end lb-container -->

<div class="lb-footer">
  <p>&copy; 2026 FlowGem Industries. All rights reserved. | <a href="../index.html">Back to Website</a></p>
</div>

<script src="series-engine.js"></script>
</body>
</html>
